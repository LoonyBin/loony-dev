<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>loony-dev · design-system Storybook</title>

  <!-- The design source-of-truth pipeline: tokens (L Space) → Material Symbols →
       the extracted visual layer. Manrope self-hosts via colors_and_type.css. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../design/colors_and_type.css" />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
  <link rel="stylesheet" href="../ds/ld-system.css" />
  <!-- per-screen composite layers (extend ld-system.css; load after it) -->
  <link rel="stylesheet" href="../ds/css/fleet.css" />
  <link rel="stylesheet" href="../ds/css/cockpit.css" />
  <link rel="stylesheet" href="../ds/css/sessions.css" />
  <link rel="stylesheet" href="../ds/css/mobile.css" />

  <!-- gallery chrome (neutral; not a design component) -->
  <style>
    body { margin: 0; background: var(--bg-subtle); color: var(--fg-primary); font-family: var(--font-sans); }
    .sb-top { position: sticky; top: 0; z-index: 20; background: var(--bg-app); border-bottom: 1px solid var(--border-default); padding: 16px 28px; }
    .sb-top h1 { margin: 0; font-size: var(--fs-h4); font-weight: var(--fw-bold); letter-spacing: -.01em; }
    .sb-top p { margin: 4px 0 0; color: var(--fg-secondary); font-size: var(--fs-sm); }
    .sb-toc { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .sb-toc a { font-size: var(--fs-xs); color: var(--fg-secondary); text-decoration: none; padding: 2px 10px; border: 1px solid var(--border-default); border-radius: 999px; }
    .sb-toc a:hover { background: var(--bg-chip); color: var(--fg-primary); }
    .sb-main { max-width: 1280px; margin: 0 auto; padding: 28px; display: flex; flex-direction: column; gap: 36px; }
    .sb-section { background: var(--bg-app); border: 1px solid var(--border-default); border-radius: var(--radius-sm); padding: 24px 26px; }
    .sb-h2 { margin: 0; font-size: var(--fs-h3); font-weight: var(--fw-bold); }
    .sb-blurb { margin: 4px 0 0; color: var(--fg-secondary); font-size: var(--fs-sm); }
    .sb-block { padding: 20px 0; border-top: 1px solid var(--border-hairline); margin-top: 18px; }
    .sb-block:first-of-type { border-top: 0; margin-top: 14px; }
    .sb-block-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .sb-name { margin: 0; font-size: var(--fs-body); font-weight: var(--fw-bold); }
    .sb-axes { display: flex; flex-wrap: wrap; gap: 12px; }
    .sb-axis { display: inline-flex; align-items: center; gap: 6px; }
    .sb-axis-k { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; padding: 1px 6px; border-radius: var(--radius-xs); }
    .sb-axis-k.v { background: var(--ld-accent-soft); color: var(--ld-accent-ink); }    /* visual (composable) */
    .sb-axis-k.s { background: var(--tag-purple-bg); color: var(--tag-purple-ink); }    /* semantic */
    .sb-axis-k.b { background: var(--st-review-soft); color: var(--st-review-ink); }    /* behavioural */
    .sb-axis-v { font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--fg-secondary); }
    .sb-specimens { display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-start; }
    .sb-specimen { display: flex; flex-direction: column; gap: 7px; }
    .sb-stage { display: inline-flex; align-items: center; gap: 10px; padding: 16px; background: var(--bg-subtle); border: 1px dashed var(--border-default); border-radius: var(--radius-xs); }
    .sb-stage.pad { padding: 22px; }
    .sb-stage.dark { background: #14141f; }
    .sb-cluster { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .sb-cap { font-size: 11.5px; color: var(--fg-muted); font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <div class="sb-top">
    <h1>loony-dev · Design-System Storybook</h1>
    <p>Composable visual components extracted from the design source-of-truth (loony-dev.html · ld-kit + screen JSX), rendered under the design tokens. Each block tags the three orthogonal axes — only the <b>visual</b> axis lives in the factory.</p>
    <nav class="sb-toc" id="sb-toc"></nav>
  </div>
  <main class="sb-main" id="sb-root"></main>

  <script type="module">
    import { renderStorybook } from './stories.js';
    const go = () => renderStorybook(document.getElementById('sb-root'));
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(go).catch(go);
    else window.addEventListener('load', go);
  </script>
</body>
</html>
